name: Auto-Combine Trackers

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:        # manual run

jobs:
  combine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Download ngosang trackers_all.txt
        run: |
          curl -L https://raw.githubusercontent.com/ngosang/trackerslist/master/trackers_all.txt -o trackersA.txt

      - name: Download XIU2 all.txt
        run: |
          curl -L https://raw.githubusercontent.com/XIU2/TrackersListCollection/master/all.txt -o trackersB.txt

      - name: Combine + sort + remove duplicates
        run: |
          cat trackersA.txt trackersB.txt | sed '/^\s*$/d' | sort -u > combined_trackers.txt

      - name: Commit + push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add combined_trackers.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update combined trackers"
          git push
