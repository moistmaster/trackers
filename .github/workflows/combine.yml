name: Auto-Combine Trackers

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:

jobs:
  combine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Download NgoSang trackers_all.txt
        run: |
          curl -L https://raw.githubusercontent.com/ngosang/trackerslist/master/trackers_all.txt -o trackersA.txt

      - name: Download XIU2 all.txt
        run: |
          curl -L https://raw.githubusercontent.com/XIU2/TrackersListCollection/master/all.txt -o trackersB.txt

      - name: Combine + remove duplicates (keep original order)
        run: |
          cat trackersA.txt trackersB.txt \
          | awk '!seen[$0]++ && NF' \
          > combined_trackers.txt

      - name: Commit + push
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add combined_trackers.txt

          # commit only if changes exist
          if ! git diff --quiet --staged; then
            git commit -m "Auto-update combined trackers"
            git push https://x-access-token:${GH_PAT}@github.com/${{ github.repository }} HEAD:${{ github.ref_name }}
          else
            echo "No changes to commit."
          fi
